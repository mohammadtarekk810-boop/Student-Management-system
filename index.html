<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4 shadow">
        <div class="container"><span class="navbar-brand fw-bold">Student Manager</span></div>
    </nav>

    <main class="container py-4">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card shadow-sm p-4 d-flex flex-row justify-content-between align-items-center h-100">
                    <div>
                        <h6 class="text-muted mb-1">Total Students</h6>
                        <h2 id="studentsCount" class="fw-bold m-0">0</h2>
                    </div>
                    <i class="fa-solid fa-graduation-cap fa-3x text-dark opacity-75"></i>
                </div>
            </div>
            
            <div class="col-md-8">
                <div class="card shadow-sm p-4">
                    <form id="studentForm" class="row g-3">
                        <input type="hidden" id="studentId">
                        <div class="col-md-6"><input id="name" class="form-control" placeholder="Name" required></div>
                        <div class="col-md-6"><input id="email" type="email" class="form-control" placeholder="Email" required></div>
                        <div class="col-md-6">
                            <select id="track" class="form-select" required>
                                <option value="" selected disabled>Select track</option>
                                <option value="Front-End">Front-End</option>
                                <option value="Back-End">Back-End</option>
                                <option value="Full-Stack">Full-Stack</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <select id="grade" class="form-select" required>
                                <option value="" selected disabled>Select grade</option>
                                <option value="A">A</option><option value="B">B</option><option value="C">C</option>
                            </select>
                        </div>
                        <div class="col-12 mt-3">
                            <button type="submit" id="submitBtn" class="btn btn-primary px-4">Add Student</button>
                            <button type="button" id="cancelBtn" class="btn btn-secondary" style="display: none;" onclick="resetForm()">Cancel Edit</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="card shadow-sm mt-5 p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <input type="text" id="search" class="form-control w-50" placeholder="Search by name..." onkeyup="displayStudents()">
                <button id="clearAllBtn" class="btn btn-outline-danger btn-sm" onclick="clearAll()">Clear All</button>
            </div>
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Track</th>
                            <th>Grade</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="studentsBody"></tbody>
                </table>
            </div>
        </div>
    </main>
    <script src="main.js"></script>
</body>
</html>
